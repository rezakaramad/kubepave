apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tenant-system
  namespace: argocd
spec:
  description: Project for tenant Argo CD resources.
  sourceRepos:
    - https://github.com/rezakaramad/kubepave-tenants
    - https://github.com/rezakaramad/kubepave-tenant-requests
  destinations:
  - name:  in-cluster
    namespace: '*'
  clusterResourceWhitelist:
    - group: idp.rezakara.demo
      kind: Tenant

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-tenant-folder
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tenant-system
  source:
    repoURL: https://github.com/rezakaramad/kubepave-tenants
    targetRevision: HEAD
    path: tenants/
    directory:
      recurse: true
  destination:
    name:  in-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-tenant-request-folder
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tenant-system
  source:
    repoURL: https://github.com/rezakaramad/kubepave-tenant-requests
    targetRevision: HEAD
    path: requests/
    directory:
      recurse: true
  destination:
    name:  in-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
