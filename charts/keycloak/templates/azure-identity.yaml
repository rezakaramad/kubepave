apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-azure-identity
  namespace: keycloak
spec:
  refreshInterval: 20m
  secretStoreRef:
    name: vault-local
    kind: ClusterSecretStore
  target:
    name: keycloak-azure-identity
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: local/management/keycloak/azure/apps/keycloak
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: local/management/keycloak/azure/apps/keycloak
        property: client_secret
    - secretKey: tenant_id
      remoteRef:
        key: local/management/keycloak/azure/apps/keycloak
        property: tenant_id

---
