tenant:
  name: ""
  dnsName: ""

  rbac:
    entraAppId: "6ebc7a2a-0d2c-4677-aebc-2b37371aca73"
    roles:
      - name: admin
        instances:
          - cluster: minikube-workload
            environmentPrefix: wl
            entraID:
              appRoleUUID: "0000000-0000-0000-0000-000000000001"
              assignment:
                principalObjectIdSelector:
                  enabled: false
                principalObjectIds:
                  - "ee16a472-e5bd-4f24-9cfe-cb22429b11c4"
        policies:
          - resource: applications
            actions:
              - get
              - update
              - delete
              - sync
              - action/apps/Deployment/pause
              - action/apps/Deployment/resume
              - action/apps/Deployment/restart
              - action/batch/CronJob/create-job
          - resource: logs
            actions:
              - get

      - name: viewer
        instances:
          - cluster: minikube-workload
            environmentPrefix: wl
            entraID:
              appRoleUUID: "0000000-0000-0000-0000-000000000002"
              assignment:
                principalObjectIdSelector:
                  enabled: false
                principalObjectIds:
                  - "ee16a472-e5bd-4f24-9cfe-cb22429b11c4"
        policies:
          - resource: applications
            actions:
              - get
          - resource: logs
            actions:
              - get
