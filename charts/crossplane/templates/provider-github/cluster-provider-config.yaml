{{- if .Values.githubProvider.enabled }}

apiVersion: github.m.upbound.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: github-fluxdojo
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane
      name: crossplane-github-identity-fluxdojo
      key: credentials

---
apiVersion: github.m.upbound.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: github-rezakaramad
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane
      name: crossplane-github-identity-rezakaramad
      key: credentials

{{- end }}
