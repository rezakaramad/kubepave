{{- if .Values.githubProvider.enabled }}
# This will allow Crossplane to create deployment repositories in 'fluxdojo' GitHub organization.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crossplane-github-app-fluxdojo
  namespace: crossplane
spec:
  refreshInterval: 20m
  secretStoreRef:
    name: vault-local
    kind: ClusterSecretStore
  target:
    name: crossplane-github-app-fluxdojo
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      mergePolicy: Replace
      data:
        credentials: |
          {
            "app_auth": [{
              "id": "{{`{{ .app_id }}`}}",
              "installation_id": "{{`{{ .installation_id }}`}}",
              "pem_file": {{`{{ .pem | toJson }}`}}
            }],
            "owner": "fluxdojo"
          }
  data:
    - secretKey: app_id
      remoteRef:
        key: management/github/apps/crossplane/fluxdojo
        property: app-id
    - secretKey: installation_id
      remoteRef:
        key: management/github/apps/crossplane/fluxdojo
        property: installation-id
    - secretKey: pem
      remoteRef:
        key: management/github/apps/crossplane/fluxdojo
        property: private-key

---
