{{- if .Capabilities.APIVersions.Has "apiextensions.crossplane.io/v1/Composition" }}
{{- if .Values.tenantBootstrap.enabled }}

# Developers: submit TenantClaims in devex namespace (no patch/update)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenantclaim-submitter
  namespace: devex
rules:
- apiGroups: ["idp.rezakara.demo"]
  resources: ["tenantclaims"]
  verbs: ["create", "get", "list", "watch"]

---

# Platform engineers: approve Tenants (cluster-scoped XR)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-approver
rules:
- apiGroups: ["idp.rezakara.demo"]
  resources: ["tenants"]
  verbs: ["get", "list", "watch", "patch", "update"]

---

# Crossplane internal: manage ArgoCD apps
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-manage-argocd-apps
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["idp.rezakara.demo"]
  resources: ["tenants"]
  verbs: ["get", "list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-manage-argocd-apps
subjects:
- kind: ServiceAccount
  name: crossplane
  namespace: crossplane
roleRef:
  kind: ClusterRole
  name: crossplane-manage-argocd-apps
  apiGroup: rbac.authorization.k8s.io

---
{{- end }}
{{- end }}
