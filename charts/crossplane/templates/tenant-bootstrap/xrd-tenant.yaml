{{- if .Capabilities.APIVersions.Has "apiextensions.crossplane.io/v2/CompositeResourceDefinition" }}
{{- if .Values.tenantBootstrap.enabled }}

apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: tenants.idp.rezakara.demo

spec:
  scope: Cluster
  group: idp.rezakara.demo

  names:
    kind: Tenant
    plural: tenants

  defaultCompositionRef:
    name: tenant-default

  versions:
    - name: v1alpha1
      served: true
      referenceable: true

      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]

          # ------------------------------------------------------------------
          # Metadata-based validation (identity rules)
          # ------------------------------------------------------------------
          x-kubernetes-validations:
            - rule: "self.metadata.name.size() <= 20"
              message: "Tenant name must be 20 characters or less"

            - rule: "self.metadata.name.matches('^[a-z0-9]+(-[a-z0-9]+)*$')"
              message: "Tenant name must be lowercase alphanumeric with hyphens"

            - rule: "!self.metadata.name.matches('(^|-)(dev|test|stage|prod)(-|$)')"
              message: "Tenant name must not include reserved environment segments (dev, test, stage, prod)"

          properties:

            spec:
              type: object
              required: ["dnsName", "owner", "argocd"]

              properties:
                crossplane:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true

                dnsName:
                  type: string
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

                displayName:
                  type: string
                  minLength: 1
                  maxLength: 128

                owner:
                  type: object
                  required: ["team"]
                  properties:
                    team:
                      type: string
                      minLength: 1
                      maxLength: 128
                    email:
                      type: string
                      maxLength: 256

                argocd:
                  type: object
                  required: ["syncRepos"]
                  properties:
                    syncRepos:
                      type: array
                      minItems: 1
                      items:
                        type: string
                        pattern: "^(https://|ssh://|git@).+"

                    syncPolicy:
                      type: object
                      properties:
                        automatedSync:
                          type: boolean
                        prune:
                          type: boolean
                        selfHeal:
                          type: boolean

                options:
                  type: object
                  properties:
                    costCenter:
                      type: string
                      maxLength: 64
                    labels:
                      type: object
                      additionalProperties:
                        type: string
                    annotations:
                      type: object
                      additionalProperties:
                        type: string

            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true 

              properties:

                phase:
                  type: string
                  description: Current lifecycle phase of the tenant.
                  enum:
                    - Provisioning
                    - Ready
                    - Failed

                rendered:
                  type: object
                  description: Summary of rendered resources exported to Git.
                  properties:
                    resources:
                      type: integer
                    message:
                      type: string

                conditions:
                  type: array
                  description: Standard Crossplane conditions.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

                observedGeneration:
                  type: integer
                  format: int64

      additionalPrinterColumns:

        - name: Tenant
          type: string
          jsonPath: .metadata.name

        - name: DNS
          type: string
          jsonPath: .spec.dnsName

        - name: Team
          type: string
          jsonPath: .spec.owner.team

        - name: Resources
          type: integer
          jsonPath: .status.rendered.resources

        - name: Phase
          type: string
          jsonPath: .status.phase

---
{{- end }}
{{- end }}
