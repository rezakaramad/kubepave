{{- if .Capabilities.APIVersions.Has "apiextensions.crossplane.io/v1/Composition" }}
{{- if .Values.tenantBootstrap.enabled }}

apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: tenant-default
  labels:
    crossplane.io/xrd: tenants.idp.rezakara.demo

spec:
  compositeTypeRef:
    apiVersion: idp.rezakara.demo/v1alpha1
    kind: Tenant

  mode: Pipeline

  pipeline:
    - step: provision
      functionRef:
        name: function-tenant-renderer

      input:
        apiVersion: tenant.rezakara.demo/v1alpha1
        kind: PlatformConfig
        clusters:
          - name: minikube-workload
            environmentPrefix: wl
        rbac:
          roles:
            - name: admin
              policies:
                - resource: applications
                  actions:
                    - get
                    - update
                    - delete
                    - sync
                    - action/apps/Deployment/pause
                    - action/apps/Deployment/resume
                    - action/apps/Deployment/restart
                    - action/batch/CronJob/create-job
                - resource: logs
                  actions:
                    - get

            - name: viewer
              policies:
                - resource: applications
                  actions:
                    - get
                - resource: logs
                  actions:
                    - get

{{- end }}
{{- end }}
