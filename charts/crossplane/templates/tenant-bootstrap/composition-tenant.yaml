{{- if .Capabilities.APIVersions.Has "apiextensions.crossplane.io/v1/Composition" }}
{{- if .Values.tenantBootstrap.enabled }}

apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: tenant-default
  labels:
    crossplane.io/xrd: tenants.idp.rezakara.demo

spec:
  compositeTypeRef:
    apiVersion: idp.rezakara.demo/v1alpha1
    kind: Tenant

  mode: Pipeline

  pipeline:
    # Step 1: Validate DNS, check approval gate.
    # Halts here with PendingApproval until spec.approved=true.
    - step: validate-and-approve
      functionRef:
        name: function-tenant-validator

    # Step 2: Render ArgoCD Applications + RepositoryFile to Git.
    # Only runs if Step 1 passes (i.e. approved).
    - step: provision
      functionRef:
        name: function-tenant-renderer

      input:
        apiVersion: template.fn.crossplane.io/v1beta1
        kind: Input
        clusters:
          - name: minikube-workload
            environmentPrefix: wl
        rbac:
          roles:
            - name: admin
              principalObjectIds:
                - "ee16a472-e5bd-4f24-9cfe-cb22429b11c4"
              policies:
                - resource: applications
                  actions:
                    - get
                    - update
                    - delete
                    - sync
                    - action/apps/Deployment/pause
                    - action/apps/Deployment/resume
                    - action/apps/Deployment/restart
                    - action/batch/CronJob/create-job
                - resource: logs
                  actions:
                    - get

            - name: viewer
              principalObjectIds:
                - "ee16a472-e5bd-4f24-9cfe-cb22429b11c4"
              policies:
                - resource: applications
                  actions:
                    - get
                - resource: logs
                  actions:
                    - get

{{- end }}
{{- end }}
