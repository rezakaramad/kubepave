{{- if false }}{{/* TenantRequest XRD disabled — replaced by TenantClaim. Source kept for reference. */}}

apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: tenantrequests.idp.rezakara.demo

spec:
  scope: Cluster
  group: idp.rezakara.demo

  names:
    kind: TenantRequest
    plural: tenantrequests

  defaultCompositionRef:
    name: tenantrequest-default

  versions:
    - name: v1alpha1
      served: true
      referenceable: true

      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]

          x-kubernetes-validations:
            - rule: "self.metadata.name.size() <= 20"
              message: "Tenant name must be 20 characters or less"

            - rule: "!self.metadata.name.matches('(^|-)(dev|test|stage|prod)(-|$)')"
              message: "Tenant name must not contain environment names (dev, test, stage, prod)"

            - rule: >
                oldSelf == null || (
                  self.spec.dnsName == oldSelf.spec.dnsName &&
                  self.spec.displayName == oldSelf.spec.displayName &&
                  self.spec.owner == oldSelf.spec.owner &&
                  self.spec.argocd == oldSelf.spec.argocd
                )
              message: "user-controlled spec fields are immutable after creation"

          properties:
            spec:
              type: object
              required: ["dnsName", "owner", "argocd"]

              properties:
                dnsName:
                  type: string
                  minLength: 1
                  maxLength: 63
                  pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

                displayName:
                  type: string
                  minLength: 1
                  maxLength: 128

                owner:
                  type: object
                  required: ["team"]
                  properties:
                    team:
                      type: string
                    email:
                      type: string

                approved:
                  type: boolean
                  description: Set to true to approve this TenantRequest and trigger provisioning.
                  default: false

                argocd:
                  type: object
                  required: ["syncRepos"]
                  properties:
                    syncRepos:
                      type: array
                      minItems: 1
                      items:
                        type: string
                        pattern: "^(https://|ssh://|git@).+"

            status:
              type: object
              properties:

                observedGeneration:
                  type: integer
                  format: int64

                phase:
                  type: string
                  description: Current lifecycle phase of the request.
                  enum:
                    - Validating
                    - PendingApproval
                    - Ready
                    - Failed

                conditions:
                  type: array
                  description: Standard Crossplane status conditions including approval state.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

      additionalPrinterColumns:
        - name: Tenant
          type: string
          jsonPath: .metadata.name
        - name: Team
          type: string
          jsonPath: .spec.owner.team
        - name: Approved
          type: boolean
          jsonPath: .spec.approved
        - name: Phase
          type: string
          jsonPath: .status.phase

---
{{- end }}
