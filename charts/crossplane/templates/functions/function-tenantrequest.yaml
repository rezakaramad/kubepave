{{- if .Values.tenantBootstrap.enabled }}

{{- if .Capabilities.APIVersions.Has "pkg.crossplane.io/v1/Function" }}
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-tenantrequest
spec:
  package: {{ required "tenantrequest.providerPackage is required" .Values.tenantBootstrap.functions.tenantrequest.providerPackage }}
  runtimeConfigRef:
    name: function-tenantrequest

---
{{- end }}
{{- if .Capabilities.APIVersions.Has "pkg.crossplane.io/v1beta1/DeploymentRuntimeConfig" }}
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: function-tenantrequest
spec:
  deploymentTemplate:
    spec:
      selector: {} 
      template:
        spec:
          containers:
            - name: package-runtime
              env:
                - name: PDNS_API_URL
                  value: "http://host.minikube.internal:5380/api/v1"
                - name: PDNS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: powerdns-api-key
                      key: key
                - name: DNS_BASE_DOMAIN
                  value: "rezakara.demo"
                - name: GIT_REPOSITORY
                  value: "kubepave-tenants"
                - name: GIT_BRANCH
                  value: "main"
                - name: GIT_BASE_PATH
                  value: "tenants"
                - name: CROSSPLANE_NAMESPACE
                  value: "crossplane"

---
{{- end }}
{{- end }}
