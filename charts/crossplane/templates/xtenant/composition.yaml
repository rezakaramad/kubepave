{{- if .Capabilities.APIVersions.Has "apiextensions.crossplane.io/v1/Composition" }}
{{- if .Values.tenantBootstrap.enabled }}

apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xtenant

spec:
  compositeTypeRef:
    apiVersion: idp.rezakara.demo/v1beta1
    kind: XTenant

  mode: Pipeline

  pipeline:
    # Step 1: Validate DNS, check approval gate.
    # Halts here with PendingApproval until spec.approved=true.
    - step: validate-and-approve
      functionRef:
        name: xtenant-validate
      input:
        apiVersion: platform.rezakara.demo/v1beta1
        kind: Input
        dns:
          baseDomain: rezakara.demo
          provider: powerdns
          apiURL: "http://host.minikube.internal:5380/api/v1"
          credentialsSecretRef:
            namespace: crossplane
            name: powerdns-api-key
            key: key
        clusters:
          - name: minikube-workload
            prefix: wl

    # Step 2: Render ArgoCD Applications + RepositoryFile to Git.
    # Only runs if Step 1 passes (i.e. approved).
    - step: provision
      functionRef:
        name: xtenant-render

      input:
        apiVersion: platform.rezakara.demo/v1beta1
        kind: Input
        github:
          providerConfigName: github-rezakaramad
          commitAuthor: "Crossplane"
          commitEmail: "crossplane@rezkara.demo"
        azure:
          principalType: user
          userPrincipalDomain: rkaramadgmail.onmicrosoft.com
        tenant:
          bindings:
            - name: admin
              cluster: minikube-workload
              environmentPrefix: wl

{{- end }}
{{- end }}
