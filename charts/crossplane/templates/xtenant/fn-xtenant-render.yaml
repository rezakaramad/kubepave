{{- if .Capabilities.APIVersions.Has "pkg.crossplane.io/v1/Function" }}
{{- if .Values.tenantBootstrap.enabled }}

apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: xtenant-render
spec:
  package: {{ required "tenantBootstrap.functions.xtenantRender.providerPackage is required" .Values.tenantBootstrap.functions.xtenantRender.providerPackage }}
  runtimeConfigRef:
    name: xtenant-render

---
{{- end }}
{{- if .Capabilities.APIVersions.Has "pkg.crossplane.io/v1beta1/DeploymentRuntimeConfig" }}
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: xtenant-render
spec:
  deploymentTemplate:
    spec:
      selector: {} 
      template:
        spec:
          containers:
            - name: package-runtime
              env:
                - name: EXPORT_REPOSITORY
                  value: "kubepave-tenants"
                - name: EXPORT_REPO_BRANCH
                  value: "main"
                - name: EXPORT_REPO_BASE_PATH
                  value: "tenants"
                - name: BASELINE_REPO_URL
                  value: "https://github.com/rezakaramad/kubepave.git"
                - name: BASELINE_REPO_BRANCH
                  value: "main"
                - name: BASELINE_REPO_BASE_PATH
                  value: "charts/baseline-tenant"
                - name: GITOPS_REPO_URL
                  value: "https://github.com/rezakaramad/kubepave.git"
                - name: GITOPS_REPO_BRANCH
                  value: "main"
                - name: GITOPS_REPO_BASE_PATH
                  value: "charts/gitops-tenant"

---
{{- end }}
{{- end }}
