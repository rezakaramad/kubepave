githubProvider:
  enabled: false
  providerPackage: xpkg.upbound.io/crossplane-contrib/provider-upjet-github:v0.19.0
  activatedResources:
  - repositories.repo.github.m.upbound.io
  - repositoryfiles.repo.github.m.upbound.io

keycloakProvider:
  enabled: false
  providerPackage: xpkg.upbound.io/crossplane-contrib/provider-keycloak:v2.7.2

azureADProvider:
  enabled: false
  providerPackage: xpkg.upbound.io/upbound/provider-azuread:v2.2.1

tenantBootstrap:
  enabled: false
  functions:
    # function-patch-and-transform:
    patchAndTransform: 
      providerPackage: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform:v0.8.2

    # crossplane-contrib-function-go-templating:
    goTemplating:
      providerPackage: xpkg.upbound.io/crossplane-contrib/function-go-templating:v0.11.3

    # function-auto-ready
    autoReady:
      providerPackage: xpkg.upbound.io/crossplane-contrib/function-auto-ready:v0.6.1

    # crossplane tenant function
    tenant:
      providerPackage: ghcr.io/rezakaramad/function-tenant:129cb1bcc570682d03415dd4f29c36680ec392f7

    # crossplane tenant-request function
    tenantrequest:
      providerPackage: ghcr.io/rezakaramad/function-tenantrequest-gitops:129cb1bcc570682d03415dd4f29c36680ec392f7

---
