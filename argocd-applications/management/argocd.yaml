apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: platform-system
  source:
    repoURL: https://github.com/rezakaramad/kubepave
    targetRevision: HEAD
    path: charts/argocd
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    syncOptions:
    - ServerSideApply=true
    - ApplyOutOfSyncOnly=true
    - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
    - group: ""
      kind: Secret
      name: argocd-secret
      namespace: argocd
      jsonPointers:
        - /data/oidc.azure.clientSecret
        - /metadata/annotations/argocd.argoproj.io~1sync-options
        - /metadata/annotations/argocd.argoproj.io~1tracking-id
        - /metadata/annotations/reconcile.external-secrets.io~1data-hash
        - /metadata/labels/reconcile.external-secrets.io~1managed
