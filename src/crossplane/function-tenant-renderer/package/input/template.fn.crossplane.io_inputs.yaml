---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: inputs.template.fn.crossplane.io
spec:
  group: template.fn.crossplane.io
  names:
    categories:
    - crossplane
    kind: Input
    listKind: InputList
    plural: inputs
    singular: input
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          Input is the configuration passed to this Function from the Composition
          pipeline step. It configures which workload clusters to deploy to and the
          RBAC roles applied to the ArgoCD project for the tenant.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          clusters:
            description: |-
              Clusters is the list of workload clusters this function deploys to.
              At least one cluster must be provided.
            items:
              description: ClusterInput identifies a single workload cluster.
              properties:
                environmentPrefix:
                  description: |-
                    EnvironmentPrefix is the short environment label used in resource naming
                    (e.g. dev, test, prod).
                  minLength: 1
                  type: string
                name:
                  description: Name is the ArgoCD destination cluster name.
                  minLength: 1
                  type: string
              required:
              - environmentPrefix
              - name
              type: object
            minItems: 1
            type: array
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          rbac:
            description: |-
              RBAC configures the ArgoCD project roles applied to the tenant.
              If omitted, default admin and viewer roles are applied.
            properties:
              roles:
                description: Roles is the list of ArgoCD project roles to create.
                items:
                  description: RoleInput defines an ArgoCD project role.
                  properties:
                    name:
                      description: Name is the role name.
                      minLength: 1
                      type: string
                    policies:
                      description: Policies defines the ArgoCD RBAC policies attached
                        to this role.
                      items:
                        description: PolicyInput defines a single ArgoCD RBAC policy
                          entry.
                        properties:
                          actions:
                            description: Actions is the list of permitted actions
                              on the resource.
                            items:
                              type: string
                            minItems: 1
                            type: array
                          resource:
                            description: Resource is the ArgoCD resource type (e.g.
                              applications, logs).
                            minLength: 1
                            type: string
                        required:
                        - actions
                        - resource
                        type: object
                      type: array
                  required:
                  - name
                  type: object
                type: array
            type: object
        required:
        - clusters
        type: object
    served: true
    storage: true
