---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: inputs.platform.rezakara.demo
spec:
  group: platform.rezakara.demo
  names:
    categories:
    - crossplane
    kind: Input
    listKind: InputList
    plural: inputs
    singular: input
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          Input is the configuration passed to this Function from the Composition
          pipeline step. It configures the tenant bindings that should be rendered
          into the GitOps application.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          azure:
            description: Azure configures Entra-specific rendering behavior.
            properties:
              principalType:
                description: PrincipalType selects whether the function creates Entra groups or users.
                enum:
                - group
                - user
                type: string
              userPrincipalDomain:
                description: UserPrincipalDomain is used when principalType=user and the function creates AzureAD users.
                type: string
            type: object
          tenant:
            description: Tenant contains the binding assignments rendered into the GitOps chart.
            properties:
              bindings:
                description: Bindings associates a role with a cluster/environment pair.
                items:
                  description: BindingInput identifies a single tenant binding.
                  properties:
                    cluster:
                      description: Cluster is the ArgoCD destination cluster name.
                      minLength: 1
                      type: string
                    environmentPrefix:
                      description: |-
                        EnvironmentPrefix is the short environment label used in resource naming
                        (e.g. dev, test, prod).
                      minLength: 1
                      type: string
                    name:
                      description: Name is the logical role name for the binding.
                      minLength: 1
                      type: string
                  required:
                  - cluster
                  - environmentPrefix
                  - name
                  type: object
                minItems: 1
                type: array
            required:
            - bindings
            type: object
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
        required:
        - tenant
        type: object
    served: true
    storage: true
