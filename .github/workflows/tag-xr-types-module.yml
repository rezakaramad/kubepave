name: Verify xr-types module

on:
  push:
    branches: [ main ]
    paths:
      - "src/crossplane/xr-types/**"
      - "!src/crossplane/xr-types/**/*.md"
    tags:
      - "src/crossplane/xr-types/**"

env:
  XR_TYPES_DIR: src/crossplane/xr-types

concurrency:
  group: xr-types-${{ github.ref }}
  cancel-in-progress: true

jobs:

  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: set-matrix
        run: |
          DIRS=$(find "$XR_TYPES_DIR" -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix={\"module\":$DIRS}" >> $GITHUB_OUTPUT

  verify:
    needs: discover
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build and vet
        run: |
          cd ${{ env.XR_TYPES_DIR }}/${{ matrix.module }}
          go build ./...
          go vet ./...

      - name: Test
        run: |
          cd ${{ env.XR_TYPES_DIR }}/${{ matrix.module }}
          go test ./...
